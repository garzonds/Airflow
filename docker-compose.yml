services:

  # ==========================
  # MySQL para datos penguins
  # ==========================
  mysql_data:
    image: mysql:8.0
    container_name: mysql_data
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: penguins_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_volume:/var/lib/mysql
    restart: always

  # ==========================
  # MySQL para metadata Airflow
  # ==========================
  mysql_airflow:
    image: mysql:8.0
    container_name: mysql_airflow
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airflow_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_airflow_volume:/var/lib/mysql
    restart: always

  # ==========================
  # Airflow INIT
  # ==========================
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      - mysql_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root@mysql_airflow:3306/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      SQLITE_DB_PATH: /opt/airflow/data/penguins.db
      MODELS_PATH: /opt/airflow/models
      MYSQL_DATA_CONN: mysql+pymysql://root:root@mysql_data:3306/penguins_db
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin \
      --firstname admin --lastname admin --role Admin \
      --email admin@email.com
      "
    volumes:
      - ./dags:/opt/airflow/dags
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow/data

  # ==========================
  # Airflow Webserver
  # ==========================
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root@mysql_airflow:3306/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      SQLITE_DB_PATH: /opt/airflow/data/penguins.db
      MODELS_PATH: /opt/airflow/models
      MYSQL_DATA_CONN: mysql+pymysql://root:root@mysql_data:3306/penguins_db
    command: airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow/data
    restart: always

  # ==========================
  # Airflow Scheduler
  # ==========================
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:root@mysql_airflow:3306/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      SQLITE_DB_PATH: /opt/airflow/data/penguins.db
      MODELS_PATH: /opt/airflow/models
      MYSQL_DATA_CONN: mysql+pymysql://root:root@mysql_data:3306/penguins_db
    command: airflow scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./models:/opt/airflow/models
      - ./data:/opt/airflow/data
    restart: always

  # ==========================
  # API de inferencia
  # ==========================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: penguins_api
    depends_on:
      - airflow-webserver
    volumes:
      - ./models:/app/models
    environment:
      MODELS_PATH: /app/models
    ports:
      - "8000:8000"
    restart: always

volumes:
  mysql_data_volume:
  mysql_airflow_volume: