---
version: '3.8'

# ============================================================
# YAML Anchors - Configuración común para servicios de Airflow
# ============================================================
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.6.0}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Rutas internas al contenedor para los volúmenes compartidos
    SQLITE_DB_PATH: /opt/airflow/data/penguins.db
    MODELS_PATH: /opt/airflow/models
    _PIP_ADDITIONAL_REQUIREMENTS: 'pandas scikit-learn palmerpenguins'
  volumes:
    - ./volumes/dags:/opt/airflow/dags
    - ./volumes/logs:/opt/airflow/logs
    - ./volumes/plugins:/opt/airflow/plugins
    - ./volumes/data:/opt/airflow/data       # SQLite de datos
    - ./volumes/models:/opt/airflow/models   # Modelos entrenados
    - ./scripts:/opt/airflow/scripts         # Scripts Python del pipeline
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy

# ============================================================
# SERVICIOS
# ============================================================
services:

  # ----------------------------------------------------------
  # 1. PostgreSQL — Metadatos de Airflow (NO datos de negocio)
  # ----------------------------------------------------------
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - mlops-net

  # ----------------------------------------------------------
  # 2. Airflow Init — Inicializa DB y crea usuario admin
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data /opt/airflow/models
        airflow db upgrade
        airflow users create \
          --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow init completado!"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    user: "0:0"
    networks:
      - mlops-net

  # ----------------------------------------------------------
  # 3. Airflow Webserver — UI en puerto 8080
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops-net

  # ----------------------------------------------------------
  # 4. Airflow Scheduler — Orquesta y lanza los DAGs
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops-net

  # ----------------------------------------------------------
  # 5. FastAPI — Servicio de inferencia del modelo entrenado
  # ----------------------------------------------------------
  inference-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: inference-api
    ports:
      - "8000:8000"
    volumes:
      - ./volumes/models:/app/models   # Accede al modelo entrenado por Airflow
    environment:
      MODELS_PATH: /app/models
    restart: always
    networks:
      - mlops-net

# ============================================================
# VOLÚMENES Y REDES
# ============================================================
volumes:
  postgres-airflow-volume:

networks:
  mlops-net:
    driver: bridge